services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-customer360}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-customer360}
      POSTGRES_DB: ${POSTGRES_DB:-customer360}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-customer360}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-}"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-root}
    ports:
      - "5050:80"
    restart: unless-stopped
    profiles:
      - dev
    networks:
      - internal

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    image: mfmfahy/addressing-backend:latest
    ports:
      - "8000:8000"
    env_file:
      - ./server/.env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-customer360}:${POSTGRES_PASSWORD:-customer360}@postgres:5432/${POSTGRES_DB:-customer360}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-}@redis:6379/0
      - PYTHONUNBUFFERED=1
    volumes:
      - ./server/db:/app/db:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - internal

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    image: mfmfahy/addressing-frontend:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - internal

volumes:
  pgdata:

networks:
  internal:
    driver: bridge
